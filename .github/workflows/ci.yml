name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: zekka_test
          POSTGRES_PASSWORD: test_password_ci
          POSTGRES_DB: zekka_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
          SESSION_SECRET: ci-test-session-secret-minimum-32-chars-long
          DATABASE_URL: postgresql://zekka_test:test_password_ci@localhost:5432/zekka_test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          VAULT_ENABLED: 'false'
          ENCRYPTION_KEY: ci-test-encryption-key-minimum-32-chars-long

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          fail_ci_if_error: false

  frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Type check
        run: npm --prefix frontend run type-check

      - name: Lint
        run: npm --prefix frontend run lint

      - name: Run tests
        run: npm --prefix frontend run test:run

      - name: Build
        run: npm --prefix frontend run build
        env:
          VITE_API_URL: http://localhost:3000
